/* ===== 기간 자동 결정 =====
   사용자 직관에 맞춘 단순 규칙:
   - month : 항상 직전 달 (m-1)
   - season: 가장 최근에 끝난 계절
   - half  : 6~11월 → 올해 상반기 / 12월 → 올해 하반기 / 1~5월 → 작년 하반기
   - year  : 1월만 작년 / 나머지는 올해
   ※ phrase는 질문 본문에 그대로 들어가는 표현 (질문 텍스트에서 "지난 " 접두는 제거됨)
*/
function autoPeriod(pt, now) {
  now = now || new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  if (pt === "month") {
    let tm = m - 1, ty = y;
    if (tm < 1) { tm += 12; ty -= 1; }
    return { key: ty + "-" + String(tm).padStart(2, "0"), label: tm + "월", phrase: "지난 " + tm + "월", year: ty };
  }
  if (pt === "season") {
    let name, ny = y;
    if (m >= 3 && m <= 5)       { name = "겨울"; ny = y; }
    else if (m >= 6 && m <= 8)  { name = "봄";   ny = y; }
    else if (m >= 9 && m <= 11) { name = "여름"; ny = y; }
    else                        { name = "가을"; ny = (m === 12 ? y : y - 1); }
    return { key: ny + "-" + name, label: name, phrase: "지난 " + name, year: ny };
  }
  if (pt === "half") {
    if (m === 12) return { key: y + "-하반기",     label: "하반기", phrase: y + "년 하반기",     year: y };
    if (m <= 5)   return { key: (y - 1) + "-하반기", label: "하반기", phrase: (y - 1) + "년 하반기", year: y - 1 };
    return         { key: y + "-상반기",           label: "상반기", phrase: y + "년 상반기",     year: y };
  }
  if (pt === "year") {
    if (m === 1) return { key: String(y - 1), label: (y - 1) + "년", phrase: (y - 1) + "년", year: y - 1 };
    return       { key: String(y),         label: y + "년",       phrase: y + "년",       year: y };
  }
  return { key: "", label: "", phrase: "" };
}

function periodOptions(pt, now) {
  now = now || new Date();
  const cur = autoPeriod(pt, now);
  const opts = [cur];
  if (pt === "month") {
    let parts = cur.key.split("-"); let tm = parseInt(parts[1], 10), ty = parseInt(parts[0], 10);
    for (let i = 0; i < 11; i++) {
      tm--; if (tm < 1) { tm += 12; ty -= 1; }
      opts.push({ key: ty + "-" + String(tm).padStart(2, "0"), label: tm + "월", phrase: "지난 " + tm + "월 (" + ty + "년)", year: ty });
    }
  } else if (pt === "season") {
    const order = ["봄", "여름", "가을", "겨울"];
    let parts = cur.key.split("-"); let yy = parseInt(parts[0], 10); let idx = order.indexOf(parts[1]);
    for (let i = 0; i < 7; i++) {
      idx--; if (idx < 0) { idx += 4; yy -= 1; }
      const nm = order[idx];
      opts.push({ key: yy + "-" + nm, label: nm, phrase: "지난 " + nm + " (" + yy + "년)", year: yy });
    }
  } else if (pt === "half") {
    let parts = cur.key.split("-"); let yy = parseInt(parts[0], 10); let isFirst = parts[1] === "상반기";
    for (let i = 0; i < 5; i++) {
      if (isFirst) { yy -= 1; isFirst = false; } else { isFirst = true; }
      const nm = isFirst ? "상반기" : "하반기";
      opts.push({ key: yy + "-" + nm, label: nm, phrase: yy + "년 " + nm, year: yy });
    }
  } else if (pt === "year") {
    let yy = parseInt(cur.key, 10);
    for (let i = 0; i < 5; i++) { yy -= 1; opts.push({ key: String(yy), label: yy + "년", phrase: yy + "년", year: yy }); }
  }
  return opts;
}

function isRecommended(pt, now) {
  now = now || new Date();
  const m = now.getMonth() + 1, d = now.getDate();
  if (pt === "month") return true;
  const inWin = (m1, d1, m2, d2) => {
    const cur = m * 100 + d, s = m1 * 100 + d1, e = m2 * 100 + d2;
    if (s <= e) return cur >= s && cur <= e;
    return cur >= s || cur <= e;
  };
  if (pt === "season") return inWin(2,16,3,15) || inWin(5,16,6,15) || inWin(8,16,9,15) || inWin(11,16,12,15);
  if (pt === "half")   return inWin(6,10,7,20) || inWin(12,11,1,20);
  if (pt === "year")   return inWin(12,1,1,31);
  return true;
}

function parseLookbackQNum(s) {
  if (!s || s.indexOf("lb-") !== 0) return null;
  const rest = s.slice(3);
  const parts = rest.split("-");
  if (parts.length < 3) return null;
  const pt = parts[0];
  const NNN = parts[parts.length - 1];
  const pk = parts.slice(1, -1).join("-");
  const n = parseInt(NNN, 10);
  if (!pt || !pk || !n) return null;
  return { pt, pk, n };
}

function wrapWords(ctx, text, maxW) {

    if (line) lines.push(line);
    return lines;
  };
  const charBreak = (tokens) => {
    const lines = []; let line = "";
    for (const w of tokens) {
      const cand = line ? line + " " + w : w;
      if (measure(cand) > maxW && line) {
        lines.push(line);
        if (measure(w) > maxW) { let piece = ""; for (const ch of w) { const t = piece + ch; if (measure(t) > maxW && piece) { lines.push(piece); piece = ch; } else piece = t; } line = piece; }

    return lines;
  };

    if (para === "") { out.push(""); continue; }
    const tokens = para.split(" ").filter(Boolean);
    if (tokens.length === 0) { out.push(""); continue; }
    let maxWordW = 0; for (const w of tokens) maxWordW = Math.max(maxWordW, measure(w));

    if (N <= 1) { out.push(tokens.join(" ")); continue; }

  }

}

  mark(); push(`5 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`);
  const xrefOffset = len;
  let xref = "xref\n0 6\n0000000000 65535 f \n";
  for (const o of offsets) xref += String(o).padStart(10, "0") + " 00000 n \n";
  push(xref);
  push(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
  const total = new Uint8Array(len); let p = 0; for (const c of chunks) { total.set(c, p); p += c.length; }

function canvasesToPdfBlob(canvases) {
  const chunks = []; let len = 0; const offsets = {};
  const push = (d) => { const b = typeof d === "string" ? strBytes(d) : d; chunks.push(b); len += b.length; };
  const mark = (n) => { offsets[n] = len; };
  push("%PDF-1.3\n");
  const N = canvases.length; const pageNums = [], imgNums = [], contNums = []; let next = 3;
  for (let i = 0; i < N; i++) { pageNums.push(next++); imgNums.push(next++); contNums.push(next++); }
  mark(1); push("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
  mark(2); push(`2 0 obj\n<< /Type /Pages /Kids [${pageNums.map((n) => n + " 0 R").join(" ")}] /Count ${N} >>\nendobj\n`);
  for (let i = 0; i < N; i++) {
    const cv = canvases[i];
    const dataUrl = cv.toDataURL("image/jpeg", 0.9);
    const bin = atob(dataUrl.split(",")[1]);
    const jpeg = new Uint8Array(bin.length); for (let j = 0; j < bin.length; j++) jpeg[j] = bin.charCodeAt(j);
    const pxW = cv.width, pxH = cv.height;
    const pageW = 595.28, pageH = +(pageW * pxH / pxW).toFixed(2);
    const pn = pageNums[i], im = imgNums[i], cn = contNums[i];
    mark(pn); push(`${pn} 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im0 ${im} 0 R >> >> /Contents ${cn} 0 R >>\nendobj\n`);
    mark(im); push(`${im} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${pxW} /Height ${pxH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`);
    push(jpeg); push("\nendstream\nendobj\n");
    const content = `q ${pageW} 0 0 ${pageH} 0 0 cm /Im0 Do Q\n`;
    mark(cn); push(`${cn} 0 obj\n<< /Length ${content.length} >>\nstream\n${content}endstream\nendobj\n`);
  }
  const xrefOffset = len; const maxObj = 2 + N * 3;
  let xref = `xref\n0 ${maxObj + 1}\n0000000000 65535 f \n`;
  for (let n = 1; n <= maxObj; n++) xref += String(offsets[n] || 0).padStart(10, "0") + " 00000 n \n";
  push(xref);
  push(`trailer\n<< /Size ${maxObj + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
  const total = new Uint8Array(len); let p = 0; for (const c of chunks) { total.set(c, p); p += c.length; }

`;

function App() {
  const [me, setMe] = useState(null);
  const [boot, setBoot] = useState(false);
  const [clubs, setClubs] = useState([]);
  const [view, setView] = useState("home");

  /* 현재 진행 중인 회고 세션 */
  const [activePeriod, setActivePeriod] = useState(null); // {pt, pk, label, phrase}
  const [activeN, setActiveN] = useState(null);

  /* 기간 선택 모달용 */
  const [pickPt, setPickPt] = useState(null);
  const [pickKey, setPickKey] = useState("");

  /* 입장 화면 */
  const [obMode, setObMode] = useState("join");
  const [penInput, setPenInput] = useState("");
  const [keyInput, setKeyInput] = useState("");
  const [selClub, setSelClub] = useState("");
  const [clubPass, setClubPass] = useState("");
  const [joinErr, setJoinErr] = useState("");
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [adminCode, setAdminCode] = useState("");
  const [adminErr, setAdminErr] = useState("");
  const [ncName, setNcName] = useState(""); const [ncType, setNcType] = useState("open"); const [ncPass, setNcPass] = useState("");

  const [myAnswered, setMyAnswered] = useState(() => new Set()); // "pt:pk:NNN"
  const [draft, setDraft] = useState(""); const [visDraft, setVisDraft] = useState("club");
  const [peers, setPeers] = useState([]); const [myEntry, setMyEntry] = useState(null);
  const [roomLoading, setRoomLoading] = useState(false);
  const [feed, setFeed] = useState([]); const [feedLoading, setFeedLoading] = useState(false);
  const [lib, setLib] = useState([]); const [libLoading, setLibLoading] = useState(false);
  const [exportText, setExportText] = useState(null); const [copied, setCopied] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false); const [adminPanel, setAdminPanel] = useState(false);
  const [freePosts, setFreePosts] = useState([]); const [freeLoading, setFreeLoading] = useState(false);
  const [fTitle, setFTitle] = useState(""); const [fBody, setFBody] = useState(""); const [fVis, setFVis] = useState("club");
  const saveTimer = useRef(null);

  useEffect(() => { (async () => {
    const s = await pGet(PKEY);
    await reloadSheet(s && s.uid);
    await ensureSeedClubs(); setClubs(await loadClubsArr());
    if (s && s.pen) {
      setMe(s);
      if (s.role === "admin") setAdminUnlocked(true);
      await refreshAnswered();
      const lastAp = await pGet(SKEY);
      if (lastAp && lastAp.pt && lastAp.pk) {
        const opts = periodOptions(lastAp.pt);
        const fnd = opts.find((o) => o.key === lastAp.pk);
        const phrase = fnd ? fnd.phrase : (lastAp.phrase || lastAp.pk);
        const label = fnd ? fnd.label : (lastAp.label || lastAp.pk);
        const year = fnd ? fnd.year : (parseInt(lastAp.pk, 10) || new Date().getFullYear());
        setActivePeriod({ pt: lastAp.pt, pk: lastAp.pk, label, phrase, year });
      }
    }
    setBoot(true);
  })(); /* eslint-disable-next-line */ }, []);

  const refreshClubs = async () => setClubs(await loadClubsArr());
  const refreshAnswered = useCallback(async () => {
    const keys = await pList("mineL:");
    const s = new Set();
    for (const k of keys) s.add(k.slice("mineL:".length));
    setMyAnswered(s);
  }, []);

  const hasAns = useCallback((pt, pk, n) => myAnswered.has(pt + ":" + pk + ":" + pad(n)), [myAnswered]);
  const sessionDoneCount = useCallback((pt, pk) => {
    const pref = pt + ":" + pk + ":";
    let c = 0; myAnswered.forEach((k) => { if (k.indexOf(pref) === 0) c++; }); return c;
  }, [myAnswered]);

  const join = async () => {
    setJoinErr("");
    const pen = penInput.trim().slice(0, 20); if (!pen) { setJoinErr("필명을 입력해 주세요."); return; }
    const code = keyInput.trim();
    if (!/^[0-9]{4,}$/.test(code)) { setJoinErr("입장 코드는 숫자 4자리 이상으로 정해 주세요."); return; }
    const club = clubs.find((c) => c.id === selClub); if (!club) { setJoinErr("클럽을 선택해 주세요."); return; }
    if (club.type === "secret" && clubPass.trim() !== (club.pass || "")) { setJoinErr("입장 비밀번호가 올바르지 않습니다."); return; }
    const uid = "k" + code;
    const next = { uid, code, pen, clubId: club.id, clubName: club.name, clubType: club.type, role: adminUnlocked ? "admin" : "member" };
    await pSet(PKEY, next); setMe(next); await reloadSheet(uid); await refreshAnswered();
  };
  const createClub = async () => {
    const name = ncName.trim().slice(0, 24); if (!name) return;
    let id = slug(name); if (clubs.find((c) => c.id === id)) id = id + "-" + genId().slice(0, 4);
    await gSet(`club:${id}`, { id, name, type: ncType, pass: ncType === "secret" ? ncPass.trim() : "", ts: Date.now(), createdBy: me ? me.uid : "admin" });
    sheetPost("add", "클럽", { id: id, "클럽명": name, "유형": ncType, "비밀번호": ncType === "secret" ? ncPass.trim() : "", "날짜": nowISO() });
    setNcName(""); setNcPass(""); setNcType("open"); await refreshClubs();
  };
  const deleteClub = async (id) => { if (!window.confirm("이 클럽을 삭제할까요? (이미 쓴 글은 남습니다)")) return; await gDel(`club:${id}`); await refreshClubs(); };

  /* 현재 활성 질문 / 치환 */
  const active = (activeN && activePeriod) ? Q(activePeriod.pt, activeN) : null;
  const activeTotal = activePeriod ? totalOf(activePeriod.pt) : 0;
  const fmtQ = (txt) => (txt || "").replace(/\{기간\}/g, activePeriod ? activePeriod.phrase : "");

  /* 기간 선택 모달 열기 / 세션 시작 */
  const openPickPeriod = (pt) => {
    const cur = autoPeriod(pt);
    setPickPt(pt); setPickKey(cur.key);
    setView("pickperiod"); window.scrollTo(0, 0);
  };
  const startSession = async () => {
    if (!pickPt || !pickKey) return;
    const opts = periodOptions(pickPt);
    const chosen = opts.find((o) => o.key === pickKey) || opts[0];
    const ap = { pt: pickPt, pk: chosen.key, label: chosen.label, phrase: chosen.phrase, year: chosen.year };
    await pSet(SKEY, ap); setActivePeriod(ap);
    const total = totalOf(pickPt); let nextN = 1;
    for (let n = 1; n <= total; n++) { if (!myAnswered.has(pickPt + ":" + ap.pk + ":" + pad(n))) { nextN = n; break; } if (n === total) nextN = 1; }
    setActiveN(nextN); setView("write"); window.scrollTo(0, 0);
    const e = await pGet("mineL:" + pickPt + ":" + ap.pk + ":" + pad(nextN));
    setDraft(e && e.text ? e.text : ""); setVisDraft(e && e.vis ? e.vis : "club");
  };
  const continueSession = async () => {
    if (!activePeriod) return;
    const total = totalOf(activePeriod.pt); let nextN = 1;
    for (let n = 1; n <= total; n++) { if (!hasAns(activePeriod.pt, activePeriod.pk, n)) { nextN = n; break; } if (n === total) nextN = 1; }
    setActiveN(nextN); setView("write"); window.scrollTo(0, 0);
    const e = await pGet("mineL:" + activePeriod.pt + ":" + activePeriod.pk + ":" + pad(nextN));
    setDraft(e && e.text ? e.text : ""); setVisDraft(e && e.vis ? e.vis : "club");
  };

  const goWriteN = async (n) => {
    if (!activePeriod) return;
    setActiveN(n); setView("write"); window.scrollTo(0, 0);
    const e = await pGet("mineL:" + activePeriod.pt + ":" + activePeriod.pk + ":" + pad(n));
    setDraft(e && e.text ? e.text : ""); setVisDraft(e && e.vis ? e.vis : "club");
  };
  const goHome = () => { setView("home"); window.scrollTo(0, 0); };
  const goNextN = () => {
    if (!activePeriod || !activeN) return;
    if (activeN >= totalOf(activePeriod.pt)) { goLibrary(); return; }
    goWriteN(activeN + 1);
  };
  const goPrevN = () => {
    if (!activeN || activeN <= 1) return;
    goWriteN(activeN - 1);
  };

  const persist = useCallback(async (pt, pk, n, text, vis) => {
    if (!me) return;
    const NNN = pad(n);
    const mk = "mineL:" + pt + ":" + pk + ":" + NNN;
    const eK = "eL:" + me.clubId + ":" + pt + ":" + pk + ":" + NNN + ":" + me.uid;
    const pK = "pubL:" + pt + ":" + pk + ":" + NNN + ":" + me.uid;
    const sk = pt + ":" + pk + ":" + NNN;
    if (!text.trim()) {
      await pDel(mk); await gDel(eK); await gDel(pK);
      setMyAnswered((p) => { const s = new Set(p); s.delete(sk); return s; });
      return;
    }
    await pSet(mk, { text, ts: Date.now(), vis });
    sheetPost("update", "글", {
      id: me.uid + "-" + lkey(pt, pk, n),
      "유형": "회고",
      "질문번호": lkey(pt, pk, n),
      "제목": ((Q(pt, n) && Q(pt, n).theme) || ""),
      "클럽": me.clubId, "필명": me.pen, "uid": me.uid,
      "공개범위": visK(vis), "내용": text, "날짜": nowISO()
    });
    const payload = { uid: me.uid, pen: me.pen, clubId: me.clubId, text, ts: Date.now(), pt, pk, n };
    if (vis === "club") { await gSet(eK, payload); await gDel(pK); }
    else if (vis === "public") { await gSet(pK, payload); await gDel(eK); }
    else { await gDel(eK); await gDel(pK); }
    setMyAnswered((p) => { const s = new Set(p); s.add(sk); return s; });
  }, [me]);

  useEffect(() => {
    if (view !== "write" || !active || !activePeriod || !me) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    const pt = activePeriod.pt, pk = activePeriod.pk, n = active.n, text = draft, vis = visDraft;
    saveTimer.current = setTimeout(() => persist(pt, pk, n, text, vis), 500);
  }, [draft, visDraft, view, active, activePeriod, me, persist]);

  const deleteEntry = async (pt, pk, n) => {
    if (!window.confirm("이 글을 삭제할까요? 화면에서 사라지며, 되돌리려면 운영자에게 문의해 주세요.")) return false;
    const NNN = pad(n); const sk = pt + ":" + pk + ":" + NNN;
    await pDel("mineL:" + pt + ":" + pk + ":" + NNN);
    await gDel("eL:" + me.clubId + ":" + pt + ":" + pk + ":" + NNN + ":" + me.uid);
    await gDel("pubL:" + pt + ":" + pk + ":" + NNN + ":" + me.uid);
    sheetPost("update", "글", { id: me.uid + "-" + lkey(pt, pk, n), "공개범위": "삭제" });
    setMyAnswered((p) => { const s = new Set(p); s.delete(sk); return s; });
    return true;
  };
  const deleteFreePost = async (pid) => {
    if (!window.confirm("이 자유 글을 삭제할까요? 화면에서 사라지며, 되돌리려면 운영자에게 문의해 주세요.")) return false;
    await pDel(`freemine:${pid}`);
    await gDel(`fe:${me.clubId}:${pid}`); await gDel(`fpub:${pid}`);
    sheetPost("update", "글", { id: pid, "공개범위": "삭제" });
    setFreePosts((p) => p.filter((x) => x.pid !== pid));
    return true;
  };

  /* 라이브러리 — 회고 글들을 (pt,pk) 세션별로 묶고 + 자유 글 추가 */
  const loadLibrary = useCallback(async () => {
    setLibLoading(true); await reloadSheet(me && me.uid); await refreshAnswered();
    // 세션별 그룹
    const sessions = {}; // sk → { pt, pk, label, phrase, items: [{n,theme,q,text,ts,vis}], total, latest }
    for (const k of await pList("mineL:")) {
      const rest = k.slice("mineL:".length); // "pt:pk:NNN"
      const i1 = rest.indexOf(":"); if (i1 < 0) continue;
      const pt = rest.slice(0, i1);
      const after = rest.slice(i1 + 1);
      const i2 = after.lastIndexOf(":"); if (i2 < 0) continue;
      const pk = after.slice(0, i2);
      const n = parseInt(after.slice(i2 + 1), 10);
      const e = await pGet(k); if (!e || !(e.text || "").trim()) continue;
      const ap = autoPeriod(pt); // for label/phrase fallback
      // 더 정확하게 라벨 재구성: periodOptions에서 pk 찾기
      const opts = periodOptions(pt);
      const found = opts.find((o) => o.key === pk);
      const label = found ? found.label : pk; const phrase = found ? found.phrase : pk;
      const yr = found ? found.year : (parseInt(pk, 10) || new Date().getFullYear());
      const sk = pt + ":" + pk;
      if (!sessions[sk]) sessions[sk] = { sk, pt, pk, label, phrase, year: yr, items: [], latest: 0 };
      const qObj = Q(pt, n);
      sessions[sk].items.push({ n, theme: qObj ? qObj.theme : "", q: qObj ? fmtQText(qObj.q, phrase) : "", text: e.text, ts: e.ts || 0, vis: e.vis || "club" });
      sessions[sk].latest = Math.max(sessions[sk].latest, e.ts || 0);
    }
    Object.values(sessions).forEach((s) => s.items.sort((a, b) => a.n - b.n));
    const sArr = Object.values(sessions).sort((a, b) => (b.latest || 0) - (a.latest || 0));
    // 자유 글
    const freeItems = [];
    for (const k of await pList("freemine:")) {
      const pid = k.split(":")[1]; const e = await pGet(k);
      if (e && (e.text || "").trim()) freeItems.push({ type: "free", key: "f" + pid, pid, title: e.title || "(제목 없음)", text: e.text, ts: e.ts || 0, vis: e.vis || "club" });
    }
    freeItems.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    setLib({ sessions: sArr, freeItems }); setLibLoading(false);
  }, [me, refreshAnswered]);
  const goLibrary = async () => { setView("library"); window.scrollTo(0, 0); await loadLibrary(); };

  /* 룸 — 같은 (pt, pk, n)에 답한 친구들 */
  const loadRoom = useCallback(async () => {
    if (!activePeriod || !active) return;
    setRoomLoading(true); await reloadSheet(me && me.uid);
    const pt = activePeriod.pt, pk = activePeriod.pk, n = active.n, NNN = pad(n);
    const mineE = await pGet("mineL:" + pt + ":" + pk + ":" + NNN); setMyEntry(mineE);
    const map = {};
    if (mineE && mineE.text && mineE.text.trim() && mineE.vis !== "private") {
      for (const k of await gList("eL:" + me.clubId + ":" + pt + ":" + pk + ":" + NNN + ":")) {
        const v = await gGet(k); if (v && v.uid !== me.uid && v.text && v.text.trim()) map[v.uid] = { ...v, vis: "club" };
      }
      for (const k of await gList("pubL:" + pt + ":" + pk + ":" + NNN + ":")) {
        const v = await gGet(k); if (v && v.uid !== me.uid && v.text && v.text.trim()) map[v.uid] = { ...v, vis: "public" };
      }
    }
    setPeers(Object.values(map).sort((a, b) => b.ts - a.ts)); setRoomLoading(false);
  }, [me, activePeriod, active]);

  const enterRoom = async () => {
    if (!active || !activePeriod) return;
    setView("room"); window.scrollTo(0, 0); await loadRoom();
  };
  useEffect(() => { if (view !== "room" || !active) return; const t = setInterval(() => loadRoom(), 20000); return () => clearInterval(t); }, [view, active, loadRoom]);

  /* 피드 — 회고 + 자유 글 통합 */
  const loadFeed = useCallback(async () => {
    setFeedLoading(true); await reloadSheet(me && me.uid); await refreshAnswered();
    // 회고: (pt, pk, n) 단위 그룹
    const map = {};
    const ensure = (pt, pk, n) => {
      const id = pt + ":" + pk + ":" + pad(n);
      return map[id] || (map[id] = { id, pt, pk, n, others: new Set(), latest: 0, pens: [], iAnswered: false, mine: "" });
    };
    const add = (pt, pk, n, uid, ts, pen) => {
      const r = ensure(pt, pk, n); r.latest = Math.max(r.latest, ts || 0);
      if (uid !== me.uid) { r.others.add(uid); if (r.pens.length < 3 && pen && r.pens.indexOf(pen) < 0) r.pens.push(pen); }
    };
    for (const k of await gList("eL:" + me.clubId + ":")) {
      // eL:club:pt:pk:NNN:uid
      const rest = k.slice(("eL:" + me.clubId + ":").length);
      const parts = rest.split(":");
      if (parts.length < 4) continue;
      const pt = parts[0]; const uid = parts[parts.length - 1]; const NNN = parts[parts.length - 2];
      const pk = parts.slice(1, -2).join(":"); // pk에 콜론 없지만 안전하게
      const v = await gGet(k); if (v && v.text && v.text.trim()) add(pt, pk, parseInt(NNN, 10), uid, v.ts, v.pen);
    }
    for (const k of await gList("pubL:")) {
      const rest = k.slice("pubL:".length);
      const parts = rest.split(":");
      if (parts.length < 3) continue;
      const pt = parts[0]; const uid = parts[parts.length - 1]; const NNN = parts[parts.length - 2];
      const pk = parts.slice(1, -2).join(":");
      const v = await gGet(k); if (v && v.text && v.text.trim()) add(pt, pk, parseInt(NNN, 10), uid, v.ts, v.pen);
    }
    for (const sk of myAnswered) {
      const i1 = sk.indexOf(":"); if (i1 < 0) continue;
      const pt = sk.slice(0, i1); const after = sk.slice(i1 + 1);
      const i2 = after.lastIndexOf(":"); if (i2 < 0) continue;
      const pk = after.slice(0, i2); const n = parseInt(after.slice(i2 + 1), 10);
      const e = await pGet("mineL:" + pt + ":" + pk + ":" + pad(n));
      const r = ensure(pt, pk, n); r.iAnswered = true;
      if (e) { r.latest = Math.max(r.latest, e.ts || 0); r.mine = e.text || ""; }
    }
    /* 자유 글 */
    const fmap = {};
    for (const k of await pList("freemine:")) { const pid = k.split(":")[1]; const e = await pGet(k); if (e && (e.text || "").trim()) fmap[pid] = { pid, title: e.title || "", text: e.text, ts: e.ts, vis: e.vis || "club", uid: me.uid, pen: me.pen }; }
    for (const k of await gList(`fe:${me.clubId}:`)) { const pid = k.split(":")[2]; if (fmap[pid]) continue; const v = await gGet(k); if (v && (v.text || "").trim()) fmap[pid] = { ...v, pid, vis: "club" }; }
    for (const k of await gList("fpub:")) { const pid = k.split(":")[1]; if (fmap[pid]) continue; const v = await gGet(k); if (v && (v.text || "").trim()) fmap[pid] = { ...v, pid, vis: "public" }; }
    setFreePosts(Object.values(fmap).sort((a, b) => b.ts - a.ts));
    const arr = Object.values(map).filter((r) => r.others.size > 0 || r.iAnswered).sort((a, b) => b.latest - a.latest);
    setFeed(arr); setFeedLoading(false);
  }, [me, myAnswered, refreshAnswered]);
  const goFeed = async () => { setView("feed"); window.scrollTo(0, 0); await loadFeed(); };

  /* 자유 글 */
  const loadFreeBoard = useCallback(async () => {
    setFreeLoading(true); await reloadSheet(me && me.uid); const map = {};
    for (const k of await pList("freemine:")) { const pid = k.split(":")[1]; const e = await pGet(k); if (e && (e.text || "").trim()) map[pid] = { pid, title: e.title || "", text: e.text, ts: e.ts, vis: e.vis || "club", uid: me.uid, pen: me.pen }; }
    for (const k of await gList(`fe:${me.clubId}:`)) { const pid = k.split(":")[2]; if (map[pid]) continue; const v = await gGet(k); if (v && (v.text || "").trim()) map[pid] = { ...v, pid, vis: "club" }; }
    for (const k of await gList("fpub:")) { const pid = k.split(":")[1]; if (map[pid]) continue; const v = await gGet(k); if (v && (v.text || "").trim()) map[pid] = { ...v, pid, vis: "public" }; }
    setFreePosts(Object.values(map).sort((a, b) => b.ts - a.ts)); setFreeLoading(false);
  }, [me]);
  const goFreeBoard = async () => { setView("freeboard"); window.scrollTo(0, 0); await loadFreeBoard(); };
  const goFreeWrite = () => { setFTitle(""); setFBody(""); setFVis("club"); setView("freewrite"); window.scrollTo(0, 0); };
  const createFreePost = async () => {
    const title = fTitle.trim().slice(0, 60); const text = fBody.trim();
    if (!title || !text) return;
    const pid = "F" + genId(); const ts = Date.now();
    await pSet(`freemine:${pid}`, { title, text, ts, vis: fVis });
    sheetPost("add", "글", { id: pid, "유형": "자유", "질문번호": "", "제목": title, "클럽": me.clubId, "필명": me.pen, "uid": me.uid, "공개범위": visK(fVis), "내용": text, "날짜": new Date(ts).toISOString() });
    const payload = { pid, uid: me.uid, pen: me.pen, clubId: me.clubId, title, text, ts };

          <div className="nss-pickrow"><button className="nss-btn nss-cta nss-tap" disabled={!penInput.trim() || keyInput.trim().length < 4 || !selClub} onClick={join}><Feather size={16} /> 입장하기</button></div>
          <div style={{ marginTop: 16, textAlign: "center" }}><button className="nss-link" onClick={() => { setObMode("admin"); setAdminErr(""); }}>관리자 모드 · 클럽 만들기</button></div>
          <p className="nss-privacy"><b>입장 코드</b>는 본인을 알아보는 열쇠입니다(같은 코드를 아는 사람은 같은 사람으로 취급되니 남과 겹치지 않게 정하세요). <b>나만 보기</b> 글은 친구 화면엔 보이지 않지만 운영자는 볼 수 있습니다. <b>클럽/전체 공개</b> 글은 같은 공간 친구들에게 보입니다.</p>
        </div></div>
      </div>
    );
  }
  if (!boot) return (<div className="nss-root"><style>{css}</style><div className="nss-wrap"><div className="nss-empty">불러오는 중…</div></div></div>);

  const totalCount = myAnswered.size + freePosts.length;
  return (
    <>
      <div className="nss-root"><style>{css}</style>
        <div className="nss-wrap">
          <div className="nss-top">
            <button className="nss-btn nss-brand" onClick={goHome}><span className="nss-seal">回</span><span style={{ textAlign: "left", minWidth: 0 }}><div className="nss-bt">{me.clubType === "secret" ? <Lock size={11} /> : <Users size={11} />} {me.clubName}{me.role === "admin" && <span className="nss-adtag">관리자</span>}</div><div className="nss-bn">돌아봄 노트</div></span></button>
            <div className="nss-hright"><button className="nss-btn nss-navbtn nss-tap" onClick={() => { setPenInput(me.pen); setAdminPanel(false); setSettingsOpen(true); }} aria-label="설정"><Settings size={15} /></button><button className="nss-btn nss-navbtn nss-tap" onClick={goLibrary}><Library size={15} /> {myAnswered.size > 0 && <span style={{ color: "var(--seal2)", fontWeight: 700 }}>{myAnswered.size}</span>}</button></div>
          </div>
          {view === "home" && renderHome()}
          {view === "pickperiod" && renderPickPeriod()}
          {view === "feed" && renderFeed()}
          {view === "freeboard" && renderFreeBoard()}
          {view === "freewrite" && renderFreeWrite()}
          {view === "write" && active && renderWrite()}
          {view === "room" && active && renderRoom()}
          {view === "library" && renderLibrary()}
          <nav className="nss-bnav">
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={goHome}><BookOpen className="ic" size={20} /> 돌아봄<br />시작하기</button>
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={goLibrary}><Library className="ic" size={20} /> 나의 노트<br />모아보기</button>
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={goFeed}><Users className="ic" size={20} /> 친구들의 노트<br />함께 보기</button>
            <a className="nss-bnavbtn nss-tap" href="http://pf.kakao.com/_XGbin" target="_blank" rel="noopener noreferrer"><MessageCircle className="ic" size={20} /> 사이트 관리자<br />에게 문의하기</a>
          </nav>
        </div>

        {settingsOpen && (
          <div className="nss-ov" onClick={() => setSettingsOpen(false)}>
            <div className="nss-modal" onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}><strong className="nss-serif" style={{ fontSize: 16 }}>{adminPanel ? "클럽 관리" : "설정"}</strong><button className="nss-btn nss-tap" onClick={() => setSettingsOpen(false)}><X size={18} /></button></div>
              {adminPanel ? renderAdminPanel(true) : (
                <>
                  <div className="nss-flabel">필명</div>
                  <input className="nss-input" maxLength={20} value={penInput} onChange={(e) => setPenInput(e.target.value)} autoFocus />
                  <div className="nss-flabel" style={{ marginTop: 16 }}>현재 클럽</div>
                  <div className="nss-adminrow"><span className="nss-clubicon" style={{ width: 30, height: 30 }}>{me.clubType === "secret" ? <Lock size={14} /> : <Globe size={14} />}</span><span className="nss-clubname" style={{ fontSize: 14.5 }}>{me.clubName}</span></div>
                  <p className="nss-privacy">클럽을 바꾸려면 로그아웃 후 다시 선택하세요.</p>
                  <div className="nss-pickrow" style={{ justifyContent: "space-between" }}>
                    <button className="nss-link" onClick={() => { setAdminPanel(true); setAdminErr(""); }}>관리자 모드</button>
                    <span style={{ display: "flex", gap: 10 }}>
                      <button className="nss-btn nss-cta ghost nss-tap" onClick={async () => { await pDel(PKEY); await pDel(SKEY); setMe(null); setActivePeriod(null); setSettingsOpen(false); setSelClub(""); setObMode("join"); }}>로그아웃</button>
                      <button className="nss-btn nss-cta nss-tap" disabled={!penInput.trim()} onClick={async () => { const next = { ...me, pen: penInput.trim().slice(0, 20) }; await pSet(PKEY, next); setMe(next); setSettingsOpen(false); }}>저장</button>
                    </span>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {exportText !== null && (
          <div className="nss-ov" onClick={() => setExportText(null)}>
            <div className="nss-modal" onClick={(e) => e.stopPropagation()}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}><strong className="nss-serif" style={{ fontSize: 16 }}>아래 글을 직접 복사하세요</strong><button className="nss-btn nss-tap" onClick={() => setExportText(null)}><X size={18} /></button></div><textarea className="nss-mod-ta" readOnly value={exportText} onFocus={(e) => e.target.select()} /></div>
          </div>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
