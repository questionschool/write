function sheetLoad() {
  return new Promise((resolve, reject) => {
    const cb = "__nss_cb_" + Math.random().toString(36).slice(2);
    const sc = document.createElement("script");
    let done = false;
    const cleanup = () => { try { delete window[cb]; } catch (e) {} if (sc.parentNode) sc.parentNode.removeChild(sc); };
    window[cb] = (data) => { done = true; cleanup(); resolve(data); };
    sc.onerror = () => { if (!done) { cleanup(); reject(new Error("sheet load failed")); } };
    sc.src = SHEET_URL + "?callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(sc);
    setTimeout(() => { if (!done) { cleanup(); reject(new Error("sheet load timeout")); } }, 15000);
  });
}
function sheetPost(action, sheet, record) {
  try {
    fetch(SHEET_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: action, sheet: sheet, record: record }) }).catch(function () {});
  } catch (e) {}
}
function hydrate(data, meUid) {
  for (const k of Object.keys(mem.shared)) delete mem.shared[k];
  const clubs = (data && data["클럽"]) || [];
  for (const c of clubs) { if (!c.id) continue; mem.shared["club:" + c.id] = JSON.stringify({ id: String(c.id), name: c["클럽명"], type: c["유형"] || "open", pass: String(c["비밀번호"] || ""), ts: Date.parse(c["날짜"]) || Date.now() }); }
  const geul = (data && data["글"]) || [];
  for (const r of geul) {
    if (!r.id) continue;
    if (r["공개범위"] === "삭제") continue;
    const vis = visFromK(r["공개범위"]); const uid = String(r["uid"] || ""); const ts = Date.parse(r["날짜"]) || Date.now();
    if (String(r["유형"]) === "자유") {
      const pid = String(r.id); const payload = { pid, uid, pen: r["필명"], clubId: String(r["클럽"]), title: r["제목"] || "", text: r["내용"] || "", ts };
      if (vis === "club") mem.shared["fe:" + r["클럽"] + ":" + pid] = JSON.stringify(payload);
      else if (vis === "public") mem.shared["fpub:" + pid] = JSON.stringify(payload);
      if (uid === meUid && !mem.personal["freemine:" + pid]) mem.personal["freemine:" + pid] = JSON.stringify({ title: payload.title, text: payload.text, ts, vis });
    } else {
      const n = parseInt(r["질문번호"], 10); if (!n) continue; const nn = String(n).padStart(3, "0");
      const payload = { uid, pen: r["필명"], clubId: String(r["클럽"]), text: r["내용"] || "", ts };
      if (vis === "club") mem.shared["e:" + r["클럽"] + ":" + nn + ":" + uid] = JSON.stringify(payload);
      else if (vis === "public") mem.shared["pub:" + nn + ":" + uid] = JSON.stringify(payload);
      if (uid === meUid && !mem.personal["mine:" + nn]) mem.personal["mine:" + nn] = JSON.stringify({ text: payload.text, ts, vis });
    }
  }
}

function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
function wrapLines(ctx, text, maxW) {
  const out = []; const paras = (text || "").split(/\n/);
  for (const para of paras) {
    if (para === "") { out.push(""); continue; }
    let line = "";
    for (const ch of para) { const t = line + ch; if (ctx.measureText(t).width > maxW && line) { out.push(line); line = ch; } else line = t; }
    out.push(line);
  }
  return out;
}

          {ncType === "secret" && <input className="nss-input" style={{ marginTop: 9 }} placeholder="입장 비밀번호" value={ncPass} onChange={(e) => setNcPass(e.target.value)} />}
          <div className="nss-pickrow"><button className="nss-btn nss-cta nss-tap" disabled={!ncName.trim() || (ncType === "secret" && !ncPass.trim())} onClick={createClub}><Plus size={15} /> 클럽 생성</button></div>
          <div className="nss-flabel" style={{ marginTop: 22 }}>현재 클럽 ({clubs.length})</div>
          {clubs.map((c) => (
            <div className="nss-adminrow" key={c.id}><span className="nss-clubicon" style={{ width: 30, height: 30 }}>{c.type === "secret" ? <Lock size={14} /> : <Globe size={14} />}</span><span style={{ flex: 1 }}><div className="nss-clubname" style={{ fontSize: 14.5 }}>{c.name}</div><div className="nss-clubtype">{c.type === "secret" ? `비밀 클럽 · 비번 ${c.pass}` : "오픈 클럽"}{c.seed ? " · 시범" : ""}</div></span><button className="nss-btn nss-tap" style={{ color: "var(--ink3)" }} onClick={() => deleteClub(c.id)} aria-label="삭제"><Trash2 size={16} /></button></div>
          ))}
          {!inModal && <div className="nss-pickrow"><button className="nss-btn nss-cta nss-tap" onClick={() => setObMode("join")}>완료 · 입장하기</button></div>}
          {inModal && <p className="nss-privacy">⚠️ 비밀번호·관리자 코드는 프로토타입상 화면에 저장되어 진짜 보안은 아닙니다.</p>}
        </div>
      )}
    </div>
  );

  if (boot && !me) {
    if (obMode === "admin") return (<div className="nss-root"><style>{css}</style><div className="nss-wrap">{renderAdminPanel(false)}</div></div>);
    const selected = clubs.find((c) => c.id === selClub);
    return (
      <div className="nss-root"><style>{css}</style>
        <div className="nss-wrap"><div className="nss-onboard nss-fade">
          <div className="nss-obctr"><div className="nss-obseal">作</div><div className="nss-obk">함께 쓰는 글쓰기 모임</div><h1 className="nss-obtitle">나를 쓰는 시간</h1><div className="nss-subt">한 줄의 기록이 삶을 바꾼다</div><p className="nss-obsub">필명을 정하고, 참여할 클럽을 골라 입장하세요.</p></div>
          <BuyBanner />
          <div className="nss-flabel" style={{ marginTop: 22 }}>필명</div>
          <input className="nss-input" placeholder="작가로서 별칭을 기록해주세요." maxLength={20} value={penInput} onChange={(e) => setPenInput(e.target.value)} />
          <div className="nss-flabel" style={{ marginTop: 22 }}>입장 코드</div>
          <input className="nss-input" type="tel" inputMode="numeric" placeholder="숫자 4자리 이상 (본인이 정함)" value={keyInput} onChange={(e) => setKeyInput(e.target.value.replace(/[^0-9]/g, ""))} onKeyDown={(e) => e.key === "Enter" && join()} />
          <div className="nss-vishint">기기를 바꿔도 <b>같은 필명·같은 코드</b>로 들어오면 내 기록이 이어집니다. 코드는 꼭 기억해 주세요.</div>
          <div className="nss-flabel" style={{ marginTop: 22 }}>클럽 선택</div>
          {clubs.length === 0 && <div className="nss-nopeer">아직 클럽이 없습니다. 관리자가 먼저 만들어야 해요.</div>}
          {clubs.map((c) => (
            <button key={c.id} className={"nss-btn nss-clubopt nss-tap" + (selClub === c.id ? " on" : "")} onClick={() => { setSelClub(c.id); setClubPass(""); setJoinErr(""); }}>
              <span className="nss-clubicon">{c.type === "secret" ? <Lock size={16} /> : <Globe size={16} />}</span>
              <span style={{ flex: 1 }}><div className="nss-clubname">{c.name}</div><div className="nss-clubtype">{c.type === "secret" ? <><Lock size={11} /> 비밀 클럽 · 입장 비밀번호 필요</> : <><Globe size={11} /> 오픈 클럽 · 누구나 입장</>}</div></span>
              {selClub === c.id && <Check size={18} style={{ color: "var(--seal2)" }} />}
            </button>
          ))}
          {selected && selected.type === "secret" && (<><div className="nss-flabel" style={{ marginTop: 8 }}>입장 비밀번호</div><input className="nss-input" type="password" placeholder="비밀번호" value={clubPass} onChange={(e) => setClubPass(e.target.value)} onKeyDown={(e) => e.key === "Enter" && join()} /></>)}
          {joinErr && <div className="nss-err">{joinErr}</div>}
          <div className="nss-pickrow"><button className="nss-btn nss-cta nss-tap" disabled={!penInput.trim() || keyInput.trim().length < 4 || !selClub} onClick={join}><Feather size={16} /> 입장하기</button></div>
          <div style={{ marginTop: 16, textAlign: "center" }}><button className="nss-link" onClick={() => { setObMode("admin"); setAdminErr(""); }}>관리자 모드 · 클럽 만들기</button></div>
          <p className="nss-privacy"><b>입장 코드</b>는 본인을 알아보는 열쇠입니다(같은 코드를 아는 사람은 같은 사람으로 취급되니 남과 겹치지 않게 정하세요). <b>나만 보기</b> 글은 친구 화면엔 보이지 않지만 운영자는 볼 수 있습니다. <b>클럽/전체 공개</b> 글은 같은 공간 친구들에게 보입니다.</p>
        </div></div>
      </div>
    );
  }
  if (!boot) return (<div className="nss-root"><style>{css}</style><div className="nss-wrap"><div className="nss-empty">불러오는 중…</div></div></div>);

  return (
    <>
      <div className="nss-root"><style>{css}</style>
        <div className="nss-wrap">
          <div className="nss-top">
            <button className="nss-btn nss-brand" onClick={goHome}><span className="nss-seal">作</span><span style={{ textAlign: "left", minWidth: 0 }}><div className="nss-bt">{me.clubType === "secret" ? <Lock size={11} /> : <Users size={11} />} {me.clubName}{me.role === "admin" && <span className="nss-adtag">관리자</span>}</div><div className="nss-bn">나를 쓰는 시간</div></span></button>
            <div className="nss-hright"><button className="nss-btn nss-navbtn nss-tap" onClick={() => { setPenInput(me.pen); setAdminPanel(false); setSettingsOpen(true); }} aria-label="설정"><Settings size={15} /></button><button className="nss-btn nss-navbtn nss-tap" onClick={goLibrary}><Library size={15} /> {answeredCount > 0 && <span style={{ color: "var(--seal2)", fontWeight: 700 }}>{answeredCount}</span>}</button></div>
          </div>
          {view === "home" && renderHome()}
          {view === "feed" && renderFeed()}
          {view === "freeboard" && renderFreeBoard()}
          {view === "freewrite" && renderFreeWrite()}
          {view === "write" && active && renderWrite()}
          {view === "room" && active && renderRoom()}
          {view === "library" && renderLibrary()}
          <nav className="nss-bnav">
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={pickRandom}><Shuffle className="ic" size={20} /> 오늘의 질문<br />노트 쓰기</button>
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={goLibrary}><Library className="ic" size={20} /> 나의 노트<br />모아보기</button>
            <button className="nss-btn nss-bnavbtn nss-tap" onClick={goFeed}><Users className="ic" size={20} /> 친구들의 노트<br />함께 보기</button>
            <a className="nss-bnavbtn nss-tap" href="http://pf.kakao.com/_XGbin" target="_blank" rel="noopener noreferrer"><MessageCircle className="ic" size={20} /> 사이트 관리자<br />에게 문의하기</a>
          </nav>
        </div>

        {settingsOpen && (
          <div className="nss-ov" onClick={() => setSettingsOpen(false)}>
            <div className="nss-modal" onClick={(e) => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}><strong className="nss-serif" style={{ fontSize: 16 }}>{adminPanel ? "클럽 관리" : "설정"}</strong><button className="nss-btn nss-tap" onClick={() => setSettingsOpen(false)}><X size={18} /></button></div>
              {adminPanel ? renderAdminPanel(true) : (
                <>
                  <div className="nss-flabel">필명</div>
                  <input className="nss-input" maxLength={20} value={penInput} onChange={(e) => setPenInput(e.target.value)} autoFocus />
                  <div className="nss-flabel" style={{ marginTop: 16 }}>현재 클럽</div>
                  <div className="nss-adminrow"><span className="nss-clubicon" style={{ width: 30, height: 30 }}>{me.clubType === "secret" ? <Lock size={14} /> : <Globe size={14} />}</span><span className="nss-clubname" style={{ fontSize: 14.5 }}>{me.clubName}</span></div>
                  <p className="nss-privacy">클럽을 바꾸려면 로그아웃 후 다시 선택하세요.</p>
                  <div className="nss-pickrow" style={{ justifyContent: "space-between" }}>
                    <button className="nss-link" onClick={() => { setAdminPanel(true); setAdminErr(""); }}>관리자 모드</button>
                    <span style={{ display: "flex", gap: 10 }}>
                      <button className="nss-btn nss-cta ghost nss-tap" onClick={async () => { await pDel(PKEY); setMe(null); setSettingsOpen(false); setSelClub(""); setObMode("join"); }}>로그아웃</button>
                      <button className="nss-btn nss-cta nss-tap" disabled={!penInput.trim()} onClick={async () => { const next = { ...me, pen: penInput.trim().slice(0, 20) }; await pSet(PKEY, next); setMe(next); setSettingsOpen(false); }}>저장</button>
                    </span>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {exportText !== null && (
          <div className="nss-ov" onClick={() => setExportText(null)}>
            <div className="nss-modal" onClick={(e) => e.stopPropagation()}><div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}><strong className="nss-serif" style={{ fontSize: 16 }}>아래 글을 직접 복사하세요</strong><button className="nss-btn nss-tap" onClick={() => setExportText(null)}><X size={18} /></button></div><textarea className="nss-mod-ta" readOnly value={exportText} onFocus={(e) => e.target.select()} /></div>
          </div>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
